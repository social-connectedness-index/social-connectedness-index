<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Connectedness Index — Map Maker</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <aside id="panel">
      <h1>Social Connectedness Index</h1>
      <p class="sub">Make a map of where a region's Facebook friendships are.</p>

      <label>Load a preset</label>
      <select id="preset"></select>

      <label>Map from (origin)</label>
      <select id="originType"></select>

      <label id="labelA">Source region</label>
      <input id="sourceSearch" type="text" placeholder="Type to filter…" autocomplete="off" />
      <select id="sourceA" size="6"></select>

      <label>Map to (destination)</label>
      <select id="destType"></select>

      <div id="countryWrap">
        <label>Show countries (groups)</label>
        <select id="group" multiple size="4"></select>
        <label>Add individual countries</label>
        <select id="customCountries" multiple size="4"></select>
        <p class="hint">Leave both empty to show all countries.</p>
      </div>

      <label>Title (optional)</label>
      <input id="title" type="text" placeholder="Auto-generated if blank" />

      <details>
        <summary>Advanced options</summary>
        <label>Subtitle (optional)</label>
        <input id="subtitle" type="text" />

        <label>Color palette</label>
        <select id="palette"></select>

        <label>Reference quantile</label>
        <input id="refq" type="number" min="0" max="1" step="0.05" value="0.25" />

        <label>Custom breaks (comma-separated)</label>
        <input id="breaks" type="text" placeholder="e.g. 1, 2, 5, 10" />

        <label class="check"><input id="borders" type="checkbox" checked /> Show region borders</label>
        <label class="check"><input id="highlight" type="checkbox" /> Highlight source region</label>

        <label>Manual zoom (optional)</label>
        <div class="grid2">
          <input id="xmin" type="number" placeholder="min lon" />
          <input id="xmax" type="number" placeholder="max lon" />
          <input id="ymin" type="number" placeholder="min lat" />
          <input id="ymax" type="number" placeholder="max lat" />
        </div>
      </details>

      <div class="actions">
        <button id="generate" class="primary">Generate map</button>
        <div class="row2">
          <select id="format">
            <option value="png">PNG</option>
            <option value="jpg">JPG</option>
            <option value="mp4">MP4 (portrait)</option>
          </select>
          <button id="download">Download</button>
        </div>
        <div class="row2">
          <button id="reset">Reset</button>
          <button id="showCode">Export R code</button>
        </div>
      </div>
      <div id="status"></div>

      <p class="foot">
        Data: Social Connectedness Index ·
        <a href="https://data.humdata.org/dataset/social-connectedness-index" target="_blank" rel="noopener">HDX</a>
      </p>
    </aside>

    <main id="mapWrap">
      <div id="preview"><p class="placeholder">Pick a source region and click <b>Generate map</b>.</p></div>
    </main>

    <div id="codeModal" class="modal">
      <div class="modal-box">
        <h3>Reproduce this map in R</h3>
        <textarea id="codeBox" readonly></textarea>
        <button id="closeCode">Close</button>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
